<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Çeviri | TR-FR (Son Düzeltme)</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .video-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .video-wrapper { position: relative; width: 48%; min-width: 300px; }
        video { width: 100%; background: #000; border-radius: 15px; border: 3px solid #333; height: 350px; object-fit: cover; }
        
        .altyazi { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.9); padding: 12px 20px; 
            font-size: 1.4rem; font-weight: bold; border-radius: 10px; 
            width: 85%; display: none; z-index: 100; line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #benimAltyazim { color: #00d4ff; border-left: 5px solid #00d4ff; }
        #karsiAltyazi { color: #ffcc00; border-left: 5px solid #ffcc00; }

        button { padding: 15px 35px; font-size: 1.1rem; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 35px; font-weight: bold; transition: 0.3s; margin: 10px; }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        #durum { color: #8e44ad; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; min-height: 25px; }
    </style>
</head>
<body onclick="ekranaDokunuldu()">

    <h1>TR-FR Akıllı Çeviri 🌍</h1>
    <div id="durum">📸 Kamera İznini Verin ve Sayfaya Tıklayın!</div>
    
    <button id="aramaYapBtn">Görüşmeyi Başlat 📞</button>

    <div class="video-container">
        <div class="video-wrapper">
            <video id="benimKameram" autoplay muted playsinline></video>
            <div id="benimAltyazim" class="altyazi"></div>
        </div>
        <div class="video-wrapper">
            <video id="karsiKamera" autoplay playsinline></video>
            <div id="karsiAltyazi" class="altyazi"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const benimKameram = document.getElementById('benimKameram');
        const karsiKamera = document.getElementById('karsiKamera');
        const aramaYapBtn = document.getElementById('aramaYapBtn');
        const benimAltyazim = document.getElementById('benimAltyazim');
        const karsiAltyazi = document.getElementById('karsiAltyazi');
        const durumCubugu = document.getElementById('durum');

        let yerelYayin = null, peerConnection = null;
        let benimDilim = "tr-TR"; 
        let islemDevamEdiyor = false;

        const config = { 
            iceServers: 
        };

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
            .then(stream => { 
                benimKameram.srcObject = stream; 
                yerelYayin = stream; 
                durumCubugu.innerText = "✅ Kamera Hazır. Bekleniyor...";
            })
            .catch(err => {
                durumCubugu.innerText = "❌ Kamera İzni Gerekli!";
            });

        // 🟢 TELEFONLARIN VİDEOYU GİZLEMESİNİ ENGELLEYEN YENİ KOD
        function ekranaDokunuldu() {
            sesiAc();
            if(karsiKamera.srcObject) karsiKamera.play().catch(e => console.log("Video oynatılıyor"));
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        function sesiAc() {
            if (recognition || !SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = benimDilim;
            recognition.onstart = () => { durumCubugu.style.color = "#2ecc71"; };
            recognition.onresult = (event) => {
                const sonIndex = event.results.length - 1;
                const text = event.results.transcript;
                if(text.trim() !== "") {
                    benimAltyazim.style.display = 'block';
                    benimAltyazim.innerText = text;
                    socket.emit('altyazi', { metin: text, kaynakDil: recognition.lang });
                    clearTimeout(window.bZ);
                    window.bZ = setTimeout(() => { benimAltyazim.style.display = 'none'; }, 4000);
                }
            };
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }

        function baglantiyiKur() {
            if (peerConnection) return; 
            peerConnection = new RTCPeerConnection(config);
            
            yerelYayin.getTracks().forEach(track => peerConnection.addTrack(track, yerelYayin));

            // 🟢 BÜYÜK HATA BURADAYDI, DÜZELTİLDİ: event.streams OLMAK ZORUNDA
            peerConnection.ontrack = (event) => {
                if (event.streams && event.streams) {
                    karsiKamera.srcObject = event.streams;
                    karsiKamera.play().catch(e => console.log("Otomatik oynatma bekliyor"));
                    durumCubugu.innerText = "✅ Görüşme Başladı!";
                    aramaYapBtn.innerText = "Görüşme Aktif ✅";
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', event.candidate);
                }
            };
        }

        aramaYapBtn.onclick = async () => {
            if (!yerelYayin) return alert("Kamera hazır değil!");
            if (islemDevamEdiyor) return; 
            
            islemDevamEdiyor = true;
            aramaYapBtn.disabled = true; 
            aramaYapBtn.innerText = "Aranıyor... ⏳";
            
            benimDilim = "tr-TR";
            if(recognition) recognition.lang = "tr-TR";
            
            baglantiyiKur();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', offer);
        };

        socket.on('offer', async (offer) => {
            if (islemDevamEdiyor) return; 
            
            islemDevamEdiyor = true;
            aramaYapBtn.disabled = true;
            aramaYapBtn.innerText = "Bağlanıyor... ⏳";

            benimDilim = "fr-FR";
            if(recognition) recognition.lang = "fr-FR";
            
            baglantiyiKur();
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        socket.on('answer', async (answer) => { 
            if(peerConnection && peerConnection.signalingState !== "stable") {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer)); 
            }
        });

        socket.on('ice-candidate', async (candidate) => { 
            try {
                if(peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch(e) {} 
        });

        // Çeviri Motoru
        socket.on('altyazi', async (veri) => {
            const kaynak = veri.kaynakDil.split('-');
            const hedef = benimDilim.split('-');
            let finalMsg = veri.metin;

            if (kaynak !== hedef) {
                try {
                    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(veri.metin)}&langpair=${kaynak}|${hedef}`);
                    const data = await res.json();
                    finalMsg = data.responseData.translatedText;
                } catch (e) { }
            }
            karsiAltyazi.style.display = 'block';
            karsiAltyazi.innerText = finalMsg;
            clearTimeout(window.kZ);
            window.kZ = setTimeout(() => { karsiAltyazi.style.display = 'none'; }, 5000);
        });
    </script>
</body>
</html>
